<form #messageForm="ngForm" name="messageForm" novalidate>
    <div class="modal-header">
        <h1 class="modal-title">{{ title }}</h1>
        <button type="button" class="close"
                data-dismiss="modal" aria-label="Close"
                (click)="activeModal.close()" *ngIf="closable">
            <div class="close-content"><span class="close-icon"></span></div>
        </button>
    </div>

    <div class="modal-body">
        <form #feedbackForm="ngForm" name="feedbackForm" novalidate>

            <div class="form-group">
                <label for="user_name" translate>Your Name</label>
                <input type="email" class="form-control"
                       placeholder="{{ 'John Doe' | translate}}"
                       id="user_name" name="user_name" #user_name="ngModel"
                       [(ngModel)]="userName"
                       maxlength="255"
                       required>
            </div>
            <div class="form-group">
                <label for="user_email" translate>Email</label>
                <input type="email" class="form-control"
                       placeholder="{{ 'john@doe.com' | translate}}"
                       id="user_email" name="user_email" #user_email="ngModel"
                       [(ngModel)]="userEmail"
                       pattern="{{ config.emailRegex }}" maxlength="255"
                       required>
            </div>
            <div class="form-group" >
                <label for="user_name" translate>Message</label>
                <textarea class="form-control"
                          [(ngModel)]="message"
                          rows="5" id="message"
                          placeholder="{{ 'Make sure you include your camera model and manufacture...' | translate}}"
                          name="message" type="text"
                          required nxFocusMe></textarea>
            </div>
            <div class="form-group mb-0">
                <nx-checkbox
                        name="contact"
                        componentId="contact"
                        [(ngModel)]="contact"
                        [checked]="true">
                </nx-checkbox>

                <label for="contact" translate>I want you to contact me</label>
            </div>
            <div class="form-group">
                <nx-checkbox
                        name="agree"
                        componentId="agree"
                        [(ngModel)]="agree"
                        required>
                </nx-checkbox>

                <label for="agree" translate>I agree to the <a target="_blank" href="/content/privacy">Privacy Policy</a></label>
            </div>
        </form>
    </div>
    <div class="modal-footer">
        <nx-process-button [process]="sendMessage"
                           [form]="feedbackForm"
                           action-type="'primary'"
                           buttonText="{{ 'Send' | translate }}"></nx-process-button>

        <button type="button" class="btn btn-default" (click)="close()" translate>Cancel</button>
    </div>
</form>
