<nx-pre-loader type="page" *ngIf="!plugin"></nx-pre-loader>

<div *ngIf="plugin">

    <div class="row m-0 pt-3 pl-4">
        <button class="btn btn-default btn-back" routerLink="/integrations">
            <span class="back-arrow"></span>
            <span translate>All integrations</span>
        </button>
    </div>

    <nx-layout-right [loading]="!plugin">
        <nx-block first-element *ngIf="plugin && (plugin.information || plugin.overview)">
            <header>
                {{plugin.information.name}}
            </header>

            <nx-section *ngIf="plugin.information.logo">
                <img src="{{plugin.information.logo}}" />
            </nx-section>

            <nx-section *ngIf="plugin.overview && plugin.overview.description">
                <div [innerHtml]="plugin.overview.description"></div>
            </nx-section>

            <nx-section *ngIf="plugin.overview && plugin.overview.overviewVideo">
                <nx-external-video [src]="plugin.overview.overviewVideo"></nx-external-video>
            </nx-section>
            <nx-section *ngIf="plugin.overview && plugin.overview.screenshots">
                <nx-carousel [screenshots]="plugin.overview.screenshots"></nx-carousel>
            </nx-section>
        </nx-block>

        <nx-block side-element type="gray" *ngIf="config.feedbackEnabled">
            <header translate>
                Contact
            </header>
            <nx-section>
                <div class="d-inline-flex flex-wrap align-center justify-content-center w-100">
                    <button class="btn btn-primary m-1" (click)="sendInquiry()">Business Inquiry</button>
                    <button class="btn btn-primary m-1" (click)="requestSupport()">Request Support</button>
                </div>
            </nx-section>
        </nx-block>

        <nx-block side-element type="gray" *ngIf="plugin && plugin.support">
            <header translate>
                Support
            </header>

            <nx-section *ngIf="plugin.support.supportEmail || plugin.support.supportWeb || plugin.support.supportPhone">
                <div *ngIf="plugin.support.supportWeb">
                    <a href="{{plugin.support.supportWeb}}" target="_blank" [innerHtml]="plugin.support.supportWeb"></a>
                </div>
                <div *ngIf="plugin.support.supportEmail">
                    <a href="mailto:{{plugin.support.supportEmail}}" target="_blank" [innerHtml]="plugin.support.supportEmail"></a>
                </div>
                <div *ngIf="plugin.support.supportPhone" [innerHtml]="plugin.support.supportPhone"></div>
            </nx-section>
        </nx-block>

        <nx-block side-element type="gray" *ngIf="plugin && plugin.company.companyName">
            <header>
                {{plugin.company.companyName}}
            </header>

            <nx-section *ngIf="plugin.company.companyInfo || plugin.company.companyLogo || plugin.company.companyWeb">
                <div class="card--body-logo mb-2" *ngIf="plugin.company.companyLogo"
                     [style.backgroundImage]="'url(' + plugin.company.companyLogo + ')'"
                     [style.maxWidth]="'100%'">
                </div>
<!--                <div *ngIf="plugin.company.companyLogo">-->
<!--                    <img class="w-100" [src]="plugin.company.companyLogo"/>-->
<!--                    <div class="card&#45;&#45;body-spacer"></div>-->
<!--                </div>-->
                <div *ngIf="plugin.company.companyInfo" [innerHtml]="plugin.company.companyInfo"></div>
                <div>
                    <a *ngIf="plugin.company.companyWeb"
                       [href]="url"
                       target="_blank"
                       [innerHtml]="plugin.company.companyWebTitle || plugin.company.companyWeb"></a>
                </div>
            </nx-section>
        </nx-block>

        <nx-block side-element type="gray" *ngIf="plugin && plugin.downloadFiles && plugin.downloadFiles.length > 0">
            <header translate>
                Downloads
            </header>

            <nx-section>
                <div *ngFor="let platform of plugin.downloadFiles" class="mt-3">
                    <div *ngIf="platform.name">{{ platform.name}}</div>
                    <div>
                        <a [href]="platform.url" [attr.rel]="platform.noFollow ? 'nofollow' : ''">{{platform.file}}</a>
                    </div>
                </div>
            </nx-section>
        </nx-block>

        <nx-block *ngIf="plugin && plugin.instructions">
            <header translate>
                Instructions
            </header>

            <nx-section *ngIf="plugin.instructions.instructionVideo">
                <nx-external-video [src]="plugin.instructions.instructionVideo"></nx-external-video>
            </nx-section>
            <nx-section *ngIf="plugin.instructions.screenshots">
                <nx-carousel [screenshots]="plugin.instructions.screenshots"></nx-carousel>
            </nx-section>

            <nx-section>
                <div [innerHtml]="plugin.instructions.downloadLinks"></div>
            </nx-section>
            <nx-section>
                <div [innerHtml]="plugin.instructions.installationInstructions"></div>
            </nx-section>
        </nx-block>
    </nx-layout-right>
</div>
