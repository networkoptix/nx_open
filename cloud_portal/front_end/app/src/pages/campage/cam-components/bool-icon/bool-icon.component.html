<div [ngSwitch]="value">
    <div class="icon-positive" *ngSwitchCase="true">
        &#9679; <div *ngIf="additional" class="icon-additional">{{additional}}</div>
    </div>
    <div class="icon-negative" *ngSwitchCase="false">&#9675;</div>
    <div class="icon-unknown" *ngSwitchCase="null">&#63;</div>
    <div *ngSwitchDefault [innerHTML]="value"></div>
</div>
