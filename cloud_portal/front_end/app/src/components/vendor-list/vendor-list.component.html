<nx-pre-loader *ngIf="!vendors" type="page"></nx-pre-loader>

<nx-block *ngIf="vendors">
    <header>
        {{ vendors.length + remainingVendors }} <span translate>manufacturers</span>
    </header>

    <nx-section>
        <div class="float-left mr-1 mb-1" *ngFor="let vendor of vendors">
            <nx-tag (click)="setVendor(vendor)"
                    [value]="null">
                {{vendor.name}} <span *ngIf="debug">({{vendor.count}})</span>
            </nx-tag>
        </div>
        <div class="manufacture-info">
            <span [translate]="'and_x_more'" [translateParams]="{value: remainingVendors}"></span>
        </div>
    </nx-section>
</nx-block>

<nx-block *ngIf="cameras">
    <header>
        {{ cameras }} <span translate>devices</span>
    </header>

    <nx-section>
        <div class="float-left mr-1 mb-1" *ngFor="let filter of filters">
            <nx-tag (click)="setFilter(filter)"
                    [value]="null">
                {{filter.label | translate}}
            </nx-tag>
        </div>
    </nx-section>
</nx-block>
