<nx-pre-loader *ngIf="!vendors" type="page"></nx-pre-loader>

<nx-block *ngIf="vendors">
    <header>
        {{ vendors.length }} manufacturers
    </header>

    <nx-section>
        <div class="float-left mr-1 mb-1" *ngFor="let vendor of vendors.slice(0,CONFIG.campage.vendorsShown)">
            <nx-tag (click)="setVendor(vendor)"
                    [value]="null">
                {{vendor}}
            </nx-tag>
        </div>
        <div class="manufacture-info">
            <span>... and {{vendors.length - CONFIG.campage.vendorsShown}} more</span>
        </div>
    </nx-section>
</nx-block>

<nx-block *ngIf="cameras">
    <header>
        {{ cameras }} devices
    </header>

    <nx-section>
        <div class="float-left mr-1 mb-1" *ngFor="let filter of filters">
            <nx-tag (click)="setFilter(filter)"
                    [value]="null">
                {{filter.label | translate}}
            </nx-tag>
        </div>
    </nx-section>
</nx-block>
