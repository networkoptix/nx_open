<div class="nx-search">

    <div class="row m-0">
        <div class="col-12 p-0">
            <div class="d-block d-lg-inline-flex flex-lg-row w-100">
                <div class="search-group">
                    <span class="glyphicon glyphicon-search icon-search"></span>
                    <input [(ngModel)]="localFilter.query"
                           [ngModelOptions]="{debounceTime : config.search.debounceTime}"
                           (ngModelChange)="modelChanged()"
                           [ngClass]="{'non-empty': localFilter.query != ''}"
                           [maxLength]="config.search.maxLength"
                           type="text"
                           class="form-control search-input"
                           name="query"
                           autocomplete="off"
                           [placeholder]="placeholder"/>

                    <button class="search-clear btn btn-clear" [hidden]="!localFilter.query" (click)="resetQuery()">
                        <span class="glyphicon-close"></span>
                    </button>
                </div>
                <div class="float-left btn btn-big btn-tag-selected ml-lg-3 mt-3 mt-lg-0 mr-1 mr-lg-0"
                        *ngIf="numberFilters != 0 && layout == 'full'">

                    <span class="ml-2 mr-3">
                        {{filterSelected}}
                    </span>

                    <span class="close-button" (click)="resetFilters()">
                        <span class="glyphicon tag-close-icon"></span>
                    </span>
                </div>

                <div class="btn btn-arrow btn-big btn-tag ml-lg-3 mt-3 mt-lg-0"
                        [ngClass]="{'selected' : showAdvancedOptions}"
                        (click)="toggleOptions()"
                        *ngIf="layout == 'full'">

                    <div class="nav-arrow">
                        <span></span>
                        <span></span>
                    </div>
                    <span translate>Advanced search</span>
                </div>
            </div>
        </div>

        <div class="row col-12 m-0 p-0" [hidden]="!showAdvancedOptions">
            <div class="row col-12 col-lg-9 col-xxl-6 mt-3 m-0 p-0"
                 *ngIf="localFilter.selects && localFilter.selects.length || localFilter.multiselects && localFilter.multiselects.length">

                <div class="drop col-12 col-lg-4 mt-3 mt-lg-0 pl-0 pr-0 pr-lg-3" *ngFor="let select of localFilter.selects">
                    <label style="text-transform: capitalize">{{ select.label }}</label>
                    <nx-select [name]="select.label"
                               [items]="select.items"
                               label="optionLabel"
                               [(ngModel)]="select.selected"
                               (ngModelChange)="modelChanged()"
                               [selected]="select.selected ? select.selected : null">
                    </nx-select>
                </div>

                <div class="drop col-12 col-lg-4 mt-3 mt-lg-0 pl-0 pr-0 pr-lg-3" *ngFor="let multiselect of localFilter.multiselects">
                    <label style="text-transform: capitalize">{{ multiselect.label }}</label>
                    <nx-multi-select [name]="multiselect.label"
                                     [items]="multiselect.items"
                                     [(ngModel)]="multiselect.selected"
                                     (ngModelChange)="modelChanged()"
                                     canSelectAll>
                    </nx-multi-select>
                </div>
            </div>

            <div class="col-xxl-6 mb-2 m-0 p-0"
                 [ngClass]="{'mt-2' : layout != 'full', 'mt-3 mb-2': layout == 'full'}"
                 [hidden]="!showAdvancedOptions && localFilter.tags && localFilter.tags.length">

                <div class="col-12 p-0">
                    <div class="form-group m-0">
                        <label *ngIf="layout == 'full'">Features</label>
                        <nav aria-label="Cameras table navigation">
                            <ul class="pagination m-0">
                                <li class="tags ml-0" *ngFor="let tag of localFilter.tags">
                                    <nx-tag
                                            [name]="tag.label"
                                            [(ngModel)]="tag.value"
                                            (ngModelChange)="selectBooleanFilter()"
                                            [value]="tag.value">
                                        {{ tag.label }}
                                    </nx-tag>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
