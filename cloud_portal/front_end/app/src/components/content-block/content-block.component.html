<div class="card {{type}}"
     [ngClass]="{
        'hoverable' : hoverable,
        'fixed-height': fixedHeight,
        'extended-header' : extendedHeader}">

    <div class="card--header" #headerWrapper [hidden]="!haveHeader">
        <h4>
            <ng-content select="header"></ng-content>
        </h4>
    </div>

    <ng-content></ng-content>

    <div class="card--footer" #footerWrapper [hidden]="!haveFooter">
        <ng-content select="footer"></ng-content>
    </div>
</div>
