version: '3'
services:
  webapp:
    image: mediaserver2
    ports:
      - "7001:7001"
    network_mode: "host"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - ./video:/dock
      - ./data/:/opt/networkoptix/mediaserver/var
      - ~/develop/devtools/util/:/scripts
    tmpfs:
      - /run
      - /run/lock
