version: '2'
services:
  mysql:
    image: mysql/mysql-server:5.7
    container_name: mysql1
    restart: always
    ports:
      - "3306:3306"
    expose:
      - "3306"
    environment:
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
      - MYSQL_DATABASE=cloudportal
      - MYSQL_ROOT_HOST=%
      - MYSQL_USER=cloud
      - MYSQL_PASSWORD=

  redis:
    image: redis:3.2.8-alpine
    container_name: redis1
    restart: always
    ports:
      - "6379:6379"
    expose:
      - "6379"